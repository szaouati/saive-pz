<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>SAiVE · accès protégé</title>
<style>
  :root{
    --ink:#0b1a28; --ink2:#12324a; --accent:#2a9d8f; --accent2:#1f7a6b;
    --paper:#faf8f4; --gateText:#cfe0e4; --gateMut:#7d97a3;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Times New Roman",Georgia,serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans); background:#0b1a28; min-height:100vh;}
  body.unlocked{background:var(--paper);}

  /* ---------- GATE ---------- */
  #gate{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:24px;
    background:
      radial-gradient(1100px 620px at 50% -10%, #163a52 0%, rgba(22,58,82,0) 60%),
      linear-gradient(180deg,#0d2236 0%, #0a1622 100%);
    z-index:50; transition:opacity .5s ease;
  }
  #gate.hidden{opacity:0; pointer-events:none;}
  .gcard{ width:100%; max-width:430px; text-align:center; color:var(--gateText); }
  .lock{ width:54px; height:54px; border-radius:14px; margin:0 auto 22px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,#1d4a63,#13354c); border:1px solid #28566e; box-shadow:0 10px 30px rgba(0,0,0,.35);}
  .lock svg{width:24px;height:24px;}
  .brand{font-family:var(--serif); font-size:13px; letter-spacing:.32em; text-transform:uppercase; color:var(--accent); margin-bottom:6px;}
  .gcard h1{font-family:var(--serif); font-weight:600; font-size:25px; color:#f3f7f7; margin:0 0 8px;}
  .gcard .gsub{font-size:14.5px; color:var(--gateMut); margin:0 0 26px; line-height:1.5;}
  .field{display:flex; gap:8px; max-width:380px; margin:0 auto;}
  .field input{
    flex:1; background:rgba(255,255,255,.06); border:1px solid #2c5066; color:#eef5f5;
    border-radius:10px; padding:13px 15px; font-size:15px; outline:none; transition:.15s; letter-spacing:.02em;
  }
  .field input::placeholder{color:#6f8a96;}
  .field input:focus{border-color:var(--accent); background:rgba(255,255,255,.09);}
  .field button{
    background:var(--accent); color:#05231f; border:0; border-radius:10px; padding:0 18px; font-size:14.5px;
    font-weight:700; cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .field button:hover{background:#37b3a3;}
  .field button:disabled{opacity:.6; cursor:default;}
  .gerr{height:18px; margin-top:14px; font-size:13px; color:#e98c74; opacity:0; transition:.15s;}
  .gerr.show{opacity:1;}
  .gfoot{margin-top:30px; font-size:11.5px; color:#5d7682; line-height:1.6;}
  .gfoot svg{width:12px;height:12px;vertical-align:-2px;margin-right:4px;opacity:.7;}
  @keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
  .shake{animation:shake .4s;}

  /* ---------- DOC CONTAINER ---------- */
  #doc{opacity:0; transition:opacity .6s ease; min-height:1px;}
  body.unlocked #doc{opacity:1;}

  /* ---------- SOURCE MODAL ---------- */
  #ov{position:fixed; inset:0; background:rgba(8,18,28,.55); backdrop-filter:blur(2px);
    display:none; align-items:center; justify-content:center; padding:24px; z-index:80;}
  #ov.show{display:flex;}
  .modal{background:#fff; max-width:460px; width:100%; border-radius:14px; padding:24px 26px;
    box-shadow:0 24px 60px rgba(0,0,0,.3); transform:translateY(8px); animation:rise .22s ease forwards;}
  @keyframes rise{to{transform:translateY(0);}}
  .modal .badge{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent2); font-weight:700;}
  .modal h3{font-family:var(--serif); font-size:18px; color:#0e2233; margin:8px 0 10px; line-height:1.25;}
  .modal p{font-size:14px; color:#475a67; line-height:1.55; margin:0 0 18px;}
  .modal .go{display:inline-flex; align-items:center; gap:7px; background:var(--accent2); color:#fff;
    text-decoration:none; padding:10px 16px; border-radius:9px; font-size:13.5px; font-weight:600;}
  .modal .go:hover{background:#18655a;}
  .modal .go svg{width:14px;height:14px;}
  .modal .nourl{font-size:13px; color:#90a0ab; font-style:italic;}
  .modal .x{position:absolute;}
  .mclose{float:right; background:#f0ece3; border:0; width:30px; height:30px; border-radius:8px; cursor:pointer;
    color:#6f7c88; font-size:17px; line-height:1; margin:-6px -8px 0 0;}
  .mclose:hover{background:#e6e0d4; color:#0e2233;}

  /* ---- injected content : mobile safety ---- */
  #doc{overflow-x:hidden;}
  #doc img,#doc video,#doc iframe{max-width:100%;height:auto;}
  @media(max-width:700px){
    #doc table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    #doc pre,#doc code{white-space:pre-wrap;word-break:break-word;overflow-x:auto;}
    #doc section,#doc article,#doc header,#doc footer,#doc main,#doc nav,
    #doc .section,#doc .wrapper,#doc .container,#doc .inner,#doc .layout,#doc .row{
      max-width:100%!important;
      padding-left:clamp(14px,4vw,28px)!important;
      padding-right:clamp(14px,4vw,28px)!important;
      box-sizing:border-box!important;
    }
    #doc .grid,#doc .cols,#doc .columns,#doc .flex-row{flex-direction:column!important;}
    #doc .col,#doc [class*="col-"],#doc [class*="column"]{width:100%!important;max-width:100%!important;}
    #doc h1{font-size:clamp(22px,6vw,34px)!important;}
    #doc h2{font-size:clamp(18px,5vw,26px)!important;}
    #doc h3{font-size:clamp(15px,4.5vw,20px)!important;}
    .field{flex-wrap:wrap;}
    .field button{width:100%;padding:13px 18px;margin-top:2px;}
  }
</style>
</head>

  // ---- helpers ----
  function b64d(s){ const bin=atob(s); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; }

  async function decryptDoc(pass){
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64d(P.s), iterations:250000, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']
    );
    const pt=await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(P.i)}, key, b64d(P.c));
    return new TextDecoder().decode(pt);
  }

  // ---- gate ----
  const gate=document.getElementById('gate');
  const input=document.getElementById('code');
  const go=document.getElementById('go');
  const err=document.getElementById('err');
  const card=document.querySelector('.gcard');

  async function attempt(){
    const pass=input.value.trim();
    if(!pass){ input.focus(); return; }
    go.disabled=true; err.classList.remove('show');
    try{
      const html=await decryptDoc(pass);
      document.getElementById('doc').innerHTML=html;
      document.body.classList.add('unlocked');
      gate.classList.add('hidden');
      window.scrollTo(0,0);
      setTimeout(()=>{ gate.style.display='none'; }, 550);
    }catch(e){
      go.disabled=false;
      err.classList.add('show');
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
      input.select();
    }
  }
  go.addEventListener('click', attempt);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') attempt(); });
  window.addEventListener('load', ()=>input.focus());

  // ---- source modal (event delegation; works on injected content) ----
  const ov=document.getElementById('ov');
  const mt=document.getElementById('mt');
  const md=document.getElementById('md');
  const mlink=document.getElementById('mlink');

  function openModal(t,d,u){
    mt.textContent=t||'Source';
    md.textContent=d||'';
    if(u){
      mlink.innerHTML='<a class="go" target="_blank" rel="noopener">Consulter la source <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg></a>';
      mlink.querySelector('a').href=u;
    } else {
      mlink.innerHTML='';
    }
    ov.classList.add('show');
  }
  function closeModal(){ ov.classList.remove('show'); }

  document.addEventListener('click', e=>{
    const cite=e.target.closest('.c');
    if(cite){ openModal(cite.dataset.t, cite.dataset.d, cite.dataset.u); return; }
  });
  document.getElementById('mx').addEventListener('click', closeModal);
  ov.addEventListener('click', e=>{ if(e.target===ov) closeModal(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
